name: Download + YouTube → Release

on:
  push:
    branches:
      - "**"

jobs:
  release-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (for commit message)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip ffmpeg python3-pip git
          pip install -U yt-dlp

      - name: Extract commands from commit
        id: extract
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          MODE="normal"
          URLS=""
          YT_URLS=""
          YT_AUDIO_URLS=""
          COMMIT_URLS=""

          if echo "$MSG" | grep -qP 'download-zip:'; then
            MODE="zip"
            URLS=$(echo "$MSG" | grep -oP 'download-zip:\s*\K.*')
          elif echo "$MSG" | grep -qP 'download:'; then
            URLS=$(echo "$MSG" | grep -oP 'download:\s*\K.*')
          fi

          if echo "$MSG" | grep -qP 'youtube:'; then
            YT_URLS=$(echo "$MSG" | grep -oP 'youtube:\s*\K.*')
          fi

          if echo "$MSG" | grep -qP 'youtube-audio:'; then
            YT_AUDIO_URLS=$(echo "$MSG" | grep -oP 'youtube-audio:\s*\K.*')
          fi

          if echo "$MSG" | grep -qP 'downloadc:'; then
            COMMIT_URLS=$(echo "$MSG" | grep -oP 'downloadc:\s*\K.*')
          fi

          if [ -z "$URLS" ] && [ -z "$YT_URLS" ] && [ -z "$YT_AUDIO_URLS" ] && [ -z "$COMMIT_URLS" ]; then
            echo "❌ No valid command found"
            exit 1
          fi

          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "urls=$URLS" >> $GITHUB_OUTPUT
          echo "yt_urls=$YT_URLS" >> $GITHUB_OUTPUT
          echo "yt_audio_urls=$YT_AUDIO_URLS" >> $GITHUB_OUTPUT
          echo "commit_urls=$COMMIT_URLS" >> $GITHUB_OUTPUT

      - name: Download everything to /tmp
        run: |
          mkdir -p /tmp/downloads
          mkdir -p /tmp/commit-downloads

          ########################################
          # 🌐 Normal downloads
          ########################################
          for URL in ${{ steps.extract.outputs.urls }}; do
            FILENAME=$(basename "$URL")
            echo "⬇️ Downloading $URL"

            aria2c \
              --split=4 \
              --max-connection-per-server=4 \
              --file-allocation=none \
              --dir="/tmp/downloads" \
              --out="$FILENAME" \
              "$URL"
          done

          ########################################
          # 🎬 YouTube 720p downloads
          ########################################
          for URL in ${{ steps.extract.outputs.yt_urls }}; do
            echo "🎬 Downloading YouTube (720p): $URL"

            yt-dlp \
              -f "bestvideo[height<=720]+bestaudio/best[height<=720]" \
              --merge-output-format mp4 \
              -o "/tmp/downloads/%(title).200s.%(ext)s" \
              "$URL"
          done

          ########################################
          # 🎧 YouTube audio
          ########################################
          for URL in ${{ steps.extract.outputs.yt_audio_urls }}; do
            echo "🎧 Downloading YouTube audio: $URL"

            yt-dlp \
              -f bestaudio \
              --extract-audio \
              --audio-format mp3 \
              -o "/tmp/downloads/%(title).200s.%(ext)s" \
              "$URL"
          done

          ########################################
          # 📦 downloadc: → repo commit downloads
          ########################################
          for URL in ${{ steps.extract.outputs.commit_urls }}; do
            FILENAME=$(basename "$URL")
            echo "📦 Downloading for commit: $URL"

            aria2c \
              --split=4 \
              --max-connection-per-server=4 \
              --file-allocation=none \
              --dir="/tmp/commit-downloads" \
              --out="$FILENAME" \
              "$URL"
          done

      - name: Prepare files for git and split files over 100MB
        run: |
          set -euo pipefail

          mkdir -p downloads

          python3 - <<'PY'
          from pathlib import Path
          import shutil

          SRC_DIRS = [Path("/tmp/downloads"), Path("/tmp/commit-downloads")]
          OUT_DIR = Path("downloads")

          LIMIT = 100 * 1024 * 1024      # GitHub hard limit for normal git objects
          CHUNK = 95 * 1024 * 1024       # keep a safety margin

          OUT_DIR.mkdir(parents=True, exist_ok=True)

          for src_dir in SRC_DIRS:
              if not src_dir.exists():
                  continue

              for file in src_dir.iterdir():
                  if not file.is_file():
                      continue

                  size = file.stat().st_size
                  stem = file.stem

                  # Keep small files as normal files
                  if size <= LIMIT:
                      shutil.move(str(file), str(OUT_DIR / file.name))
                      continue

                  # Split large files into a folder named after the file (without extension)
                  target_dir = OUT_DIR / stem
                  target_dir.mkdir(parents=True, exist_ok=True)

                  part_index = 1
                  with file.open("rb") as f:
                      while True:
                          chunk = f.read(CHUNK)
                          if not chunk:
                              break

                          part_name = f"{file.name}.part-{part_index:04d}"
                          part_path = target_dir / part_name
                          with part_path.open("wb") as out:
                              out.write(chunk)

                          part_index += 1

                  # Optional manifest for easier reassembly
                  manifest = target_dir / "MANIFEST.txt"
                  manifest.write_text(
                      f"original_file={file.name}\n"
                      f"original_size={size}\n"
                      f"chunk_size={CHUNK}\n"
                      f"parts={part_index - 1}\n",
                      encoding="utf-8",
                  )

                  file.unlink()
          PY

      - name: Commit repo files
        if: steps.extract.outputs.commit_urls != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add downloads

          if ! git diff --cached --quiet; then
            git commit -m "chore: add downloaded files [skip ci]"
            git push
          else
            echo "⚠️ Nothing staged — skipping commit"
          fi

      - name: Generate release tag
        id: tag
        if: steps.extract.outputs.urls != '' || steps.extract.outputs.yt_urls != '' || steps.extract.outputs.yt_audio_urls != ''
        run: |
          TAG="auto-$(date +%Y%m%d-%H%M%S)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create release & upload assets
        if: steps.tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Auto Release ${{ steps.tag.outputs.tag }}"
          body: ${{ github.event.head_commit.message }}
          files: downloads/**
