name: Download → Release

on:
  push:
    branches:
      - "**"

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Detect commands in commit message
  # ─────────────────────────────────────────────────────────────
  check-command:
    runs-on: ubuntu-latest

    outputs:
      has_command: ${{ steps.detect.outputs.has_command }}
      mode:        ${{ steps.detect.outputs.mode }}
      urls:        ${{ steps.detect.outputs.urls }}
      commit_urls: ${{ steps.detect.outputs.commit_urls }}
      tg_urls:     ${{ steps.detect.outputs.tg_urls }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Detect download command
        id: detect
        shell: bash
        run: |
          set -e

          MSG="$(git log -1 --pretty=%B)"
          echo "Commit: $MSG"

          HAS="false"
          MODE="normal"
          URLS=""
          COMMIT_URLS=""
          TG_URLS=""

          # ── download / download-zip ───────────────────────────
          if grep -qP 'download-zip:' <<<"$MSG"; then
            MODE="zip"
            URLS="$(grep -oP 'download-zip:\s*\K.*' <<<"$MSG")"
            HAS="true"
          elif grep -qP 'download:' <<<"$MSG"; then
            URLS="$(grep -oP 'download:\s*\K.*' <<<"$MSG")"
            HAS="true"
          fi

          # ── downloadc (multi-line safe parsing) ────────────────
          if grep -qP 'downloadc:' <<<"$MSG"; then
            COMMIT_URLS="$(python3 - "$MSG" <<'PY'
import re, sys
msg = sys.argv[1]
m = re.search(r'downloadc:\s*(.*?)(?=\n\s*(?:download|download-zip|downloadc|telegram):|\Z)', msg, re.S)
if m:
    print(' '.join(m.group(1).split()))
PY
)"
            [[ -n "$COMMIT_URLS" ]] && HAS="true"
          fi

          # ── telegram ──────────────────────────────────────────
          if grep -qP 'telegram:' <<<"$MSG"; then
            TG_URLS="$(grep -oP 'telegram:\s*\K.*' <<<"$MSG")"
            HAS="true"
          fi

          # ── file trigger ──────────────────────────────────────
          LINKS_FILE="download_links.txt"

          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED="$(git diff --name-only HEAD~1 HEAD)"
          else
            CHANGED="$(git show --name-only --pretty=format: HEAD)"
          fi

          if grep -qxF "$LINKS_FILE" <<<"$CHANGED" && [[ -f "$LINKS_FILE" ]]; then
            FILE_URLS="$(grep -vE '^\s*(#|$)' "$LINKS_FILE" | tr '\n' ' ')"
            if [[ -n "$FILE_URLS" ]]; then
              URLS="$URLS $FILE_URLS"
              HAS="true"
              echo "📄 $LINKS_FILE triggered"
            fi
          fi

          # ── outputs ───────────────────────────────────────────
          {
            echo "has_command=$HAS"
            echo "mode=$MODE"
            echo "urls=$URLS"
            echo "commit_urls=$COMMIT_URLS"
            echo "tg_urls=$TG_URLS"
          } >> "$GITHUB_OUTPUT"

          [[ "$HAS" == "false" ]] && echo "⏭️ No command found"

  # ─────────────────────────────────────────────────────────────
  # Job 2: Download + Release
  # ─────────────────────────────────────────────────────────────
  release-upload:
    needs: check-command
    if: needs.check-command.outputs.has_command == 'true'

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y aria2 zip git python3 python3-pip

      - name: Install Telegram deps
        if: needs.check-command.outputs.tg_urls != ''
        run: pip install -q pyrogram tgcrypto

      # (Telegram step unchanged – just cleaner heredoc)
      - name: Download Telegram media
        if: needs.check-command.outputs.tg_urls != ''
        env:
          TG_API_ID:         ${{ secrets.TG_API_ID }}
          TG_API_HASH:       ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING: ${{ secrets.TG_SESSION_STRING }}
          TG_URLS:           ${{ needs.check-command.outputs.tg_urls }}
        run: |
          python3 <<'PY'
# (your python code unchanged)
PY

      - name: Download files
        shell: bash
        run: |
          set -e

          mkdir -p /tmp/release-dl /tmp/commit-dl

          OK=0
          FAIL=0

          download() {
            local url="$1"
            local dir="$2"

            echo "⬇️ $url"

            if aria2c --split=4 --max-connection-per-server=4 \
              --file-allocation=none \
              --dir="$dir" \
              --out="$(basename "$url")" \
              "$url"; then
              ((OK++))
            else
              ((FAIL++))
              echo "⚠️ FAILED: $url"
            fi
          }

          for u in ${{ needs.check-command.outputs.urls }}; do
            download "$u" /tmp/release-dl
          done

          for u in ${{ needs.check-command.outputs.commit_urls }}; do
            download "$u" /tmp/commit-dl
          done

          echo "OK=$OK FAIL=$FAIL"

          if [[ $((OK + FAIL)) -gt 0 && $OK -eq 0 ]]; then
            echo "❌ All downloads failed"
            exit 1
          fi

      - name: Zip mode
        if: needs.check-command.outputs.mode == 'zip'
        run: |
          cd /tmp/release-dl
          zip -r /tmp/release.zip .
          rm -rf /tmp/release-dl
          mkdir -p /tmp/release-dl
          mv /tmp/release.zip /tmp/release-dl/

      - name: Prepare files
        run: |
          mkdir -p release-files commit-files
          mv /tmp/release-dl/* release-files/ 2>/dev/null || true
          mv /tmp/commit-dl/* commit-files/ 2>/dev/null || true

      - name: Commit files
        if: needs.check-command.outputs.commit_urls != '' || needs.check-command.outputs.tg_urls != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add commit-files

          if ! git diff --cached --quiet; then
            git commit -m "chore: add downloaded files [skip ci]"
            git push
          fi

      - name: Create tag
        id: tag
        if: needs.check-command.outputs.urls != ''
        run: echo "tag=auto-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: steps.tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Auto Release ${{ steps.tag.outputs.tag }}
          body: ${{ github.event.head_commit.message }}
          files: release-files/**
